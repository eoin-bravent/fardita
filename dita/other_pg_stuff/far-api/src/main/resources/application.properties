# --- Neon (same DB the Python side populated) ---
spring.datasource.url=jdbc:postgresql://ep-royal-frog-afp0v83q.c-2.us-west-2.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${NEON_PASSWORD}

# --- Claude (set ANTHROPIC_API_KEY in your environment) ---
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6

# --- Embeddings (vector lane, added later) ---
# IMPORTANT: to match the stored vectors you must embed queries with the SAME
# model used at ingest (BAAI/bge-small-en-v1.5, 384-dim) -- NOT Spring AI's
# default MiniLM. Align the ONNX model before turning on the vector lane.

server.port=8080
